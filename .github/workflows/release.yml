name: Release

on:
  workflow_run:
    workflows: ["CI"]
    branches:
      - main
    types:
      - completed

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump patch version from latest tag
        id: bump_version
        run: |
          LATEST_TAG=$(git tag | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          VERSION=${LATEST_TAG#v}
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          if ! [[ "$MAJOR" =~ ^[0-9]+$ && "$MINOR" =~ ^[0-9]+$ && "$PATCH" =~ ^[0-9]+$ ]]; then
            echo "Invalid version components: MAJOR=$MAJOR MINOR=$MINOR PATCH=$PATCH" >&2
            exit 1
          fi
          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

      - name: Create tag
        id: create_tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "${{ steps.bump_version.outputs.new_tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.bump_version.outputs.new_tag }} already exists, skipping."
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            git tag "${{ steps.bump_version.outputs.new_tag }}"
            git push origin "${{ steps.bump_version.outputs.new_tag }}"
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: steps.create_tag.outputs.created == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: "${{ steps.bump_version.outputs.new_tag }}",
              name: "Release ${{ steps.bump_version.outputs.new_tag }}",
              generate_release_notes: true,
            });
